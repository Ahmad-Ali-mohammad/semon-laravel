# =============================================================================
# Nginx Configuration for SEMO Application
# =============================================================================
# هذا الملف يحدد إعدادات Nginx لاستضافة التطبيق
# This file defines Nginx settings for hosting the application
# =============================================================================

# -----------------------------------------------------------------------------
# إعدادات المستخدم والعمليات
# User and process settings
# -----------------------------------------------------------------------------
user nginx;

# عدد عمليات العامل (auto = عدد أنوية المعالج)
# Number of worker processes (auto = number of CPU cores)
worker_processes auto;

# ملف PID
# PID file location
pid /var/run/nginx.pid;

# -----------------------------------------------------------------------------
# إعدادات الأحداث
# Events settings
# -----------------------------------------------------------------------------
events {
    # الاتصالات المتزامنة لكل عملية
    # Concurrent connections per worker
    worker_connections 1024;
    
    # استخدام poll للنظام
    # Use poll method
    use epoll;
    
    # قبول عدة اتصالات دفعة واحدة
    # Accept multiple connections at once
    multi_accept on;
}

# -----------------------------------------------------------------------------
# إعدادات HTTP
# HTTP settings
# -----------------------------------------------------------------------------
http {
    # -------------------------------------------------------------------------
    # تضمين أنواع MIME
    # Include MIME types
    # -------------------------------------------------------------------------
    include /etc/nginx/mime.types;
    
    # نوع MIME الافتراضي
    # Default MIME type
    default_type application/octet-stream;
    
    # -------------------------------------------------------------------------
    # تنسيق السجلات
    # Log format
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # الوصول إلى السجلات
    # Access log
    access_log /var/log/nginx/access.log main;
    
    # سجل الأخطاء
    # Error log
    error_log /var/log/nginx/error.log warn;
    
    # -------------------------------------------------------------------------
    # إعدادات الأداء
    # Performance settings
    # -------------------------------------------------------------------------
    # إرسال الملفات بكفاءة
    # Efficient file sending
    sendfile on;
    
    # tcp_nopush: إرسال جميع الردود دفعة واحدة
    # tcp_nopush: Send all responses at once
    tcp_nopush on;
    
    # tcp_nodelay: إرسال الحزم فوراً
    # tcp_nodelay: Send packets immediately
    tcp_nodelay on;
    
    # الحفاظ على الاتصالات الحية
    # Keep connections alive
    keepalive_timeout 65;
    
    # الحد الأقصى لحجم تحميل الملفات
    # Maximum file upload size
    client_max_body_size 64M;
    
    # -------------------------------------------------------------------------
    # ضغط Gzip
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    
    # أنواع الملفات المضغوطة
    # File types to compress
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # الحد الأدنى لحجم الضغط
    # Minimum size for compression
    gzip_min_length 1024;
    
    # مستوى الضغط (1-9)
    # Compression level (1-9)
    gzip_comp_level 6;
    
    # -------------------------------------------------------------------------
    # إعدادات المنطقة الزمنية
    # Timezone settings
    # -------------------------------------------------------------------------
    # استخدام المنطقة الزمنية المحلية
    # Use local timezone
    
    # -------------------------------------------------------------------------
    # تضمين إعدادات الخوادم
    # Include server configurations
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
