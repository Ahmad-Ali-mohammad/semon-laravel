# =============================================================================
# Nginx Default Server Configuration for SEMO Application
# =============================================================================
# هذا الملف يحدد إعدادات الخادم الافتراضية لـ Nginx
# This file defines the default server configuration for Nginx
# =============================================================================

# -----------------------------------------------------------------------------
# خادم HTTP (المنفذ 80)
# HTTP Server (Port 80)
# -----------------------------------------------------------------------------
server {
    # الاستماع على المنفذ 80
    # Listen on port 80
    listen 80;
    
    # اسم الخادم
    # Server name
    server_name localhost;
    
    # -------------------------------------------------------------------------
    # إعادة التوجيه إلى HTTPS (اختياري - للإنتاج)
    # Redirect to HTTPS (optional - for production)
    # -------------------------------------------------------------------------
    # return 301 https://$server_name$request_uri;
    
    # -------------------------------------------------------------------------
    # جذر المستندات
    # Document root
    # -------------------------------------------------------------------------
    root /var/www/html/public;
    
    # الملف الافتراضي
    # Default index file
    index index.php index.html index.htm;
    
    # -------------------------------------------------------------------------
    # رؤوس الأمان
    # Security headers
    # -------------------------------------------------------------------------
    # HSTS - Strict Transport Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # منع الضغط في iframe
    # Prevent framing
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # منع sniffing نوع MIME
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # حماية XSS
    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # سياسة الإحالة
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # سياسة الأمان للمحتوى
    # Content security policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;
    
    # -------------------------------------------------------------------------
    # الموقع الجذري
    # Root location
    # -------------------------------------------------------------------------
    location / {
        # محاولة خدمة الملفات الموجودة، وإلا التوجيه إلى index.php
        # Try to serve existing files, otherwise route to index.php
        try_files $uri $uri/ /index.php?$query_string;
        
        # التخزين المؤقت للملفات الثابتة
        # Static file caching
        expires 1M;
        add_header Cache-Control "public, immutable";
    }
    
    # -------------------------------------------------------------------------
    # معالجة ملفات PHP
    # PHP file processing
    # -------------------------------------------------------------------------
    location ~ \.php$ {
        # رفض الوصول إذا كان الملف غير موجود
        # Deny access if file doesn't exist
        try_files $uri =404;
        
        # تضمين معلمات FastCGI
        # Include FastCGI parameters
        include fastcgi_params;
        
        # تمرير الطلب إلى PHP-FPM
        # Pass request to PHP-FPM
        # ملاحظة: في Docker، نستخدم الاتصال عبر الشبكة
        # Note: In Docker, we use network connection
        fastcgi_pass app:9000;
        
        # مسار السكربت
        # Script filename
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # إعدادات FastCGI
        # FastCGI settings
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        
        # متغيرات HTTPS
        # HTTPS variables
        fastcgi_param HTTPS off;
    }
    
    # -------------------------------------------------------------------------
    # API routes
    # API routes
    # -------------------------------------------------------------------------
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
        
        # رؤوس CORS للـ API
        # CORS headers for API
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        
        # معالجة طلبات OPTIONS (preflight)
        # Handle OPTIONS requests (preflight)
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # -------------------------------------------------------------------------
    # الملفات الثابتة مع التخزين المؤقت العدواني
    # Static files with aggressive caching
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # تخزين مؤقت لمدة سنة
        # Cache for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        
        # CORS للخطوط
        # CORS for fonts
        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header Access-Control-Allow-Origin *;
        }
        
        # الوصول إلى الملفات الموجودة فقط
        # Access existing files only
        try_files $uri =404;
    }
    
    # -------------------------------------------------------------------------
    # ملفات الوسائط
    # Media files
    # -------------------------------------------------------------------------
    location /storage/ {
        # تخزين مؤقت أقل عدوانية
        # Less aggressive caching
        expires 30d;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        
        # رفض الوصول للملفات المخفية
        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
    
    # -------------------------------------------------------------------------
    # ملفات SEO
    # SEO files
    # -------------------------------------------------------------------------
    location = /sitemap.xml {
        try_files $uri $uri/ /index.php?$query_string;
        expires 1d;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }
    
    location = /robots.txt {
        try_files $uri $uri/ /index.php?$query_string;
        expires 1d;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }
    
    # -------------------------------------------------------------------------
    # منع الوصول للملفات الحساسة
    # Deny access to sensitive files
    # -------------------------------------------------------------------------
    location ~ /\. {
        # رفض جميع الملفات والمجلدات المخفية
        # Deny all hidden files and directories
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /(\.env|\.git|\.gitignore|\.gitattributes|composer\.json|composer\.lock|package\.json|package-lock\.json) {
        # رفض الوصول لملفات التكوين
        # Deny access to config files
        deny all;
        access_log off;
        log_not_found off;
        return 444;
    }
    
    # -------------------------------------------------------------------------
    # نقطة نهاية فحص الصحة
    # Health check endpoint
    # -------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # -------------------------------------------------------------------------
    # صفحات الخطأ المخصصة
    # Custom error pages
    # -------------------------------------------------------------------------
    error_page 404 /index.php;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /var/www/html/public;
    }
}

