# =============================================================================
# Apache Virtual Host Configuration for SEMO Application
# =============================================================================
# هذا الملف يحدد إعدادات Apache لاستضافة تطبيق Laravel
# This file defines Apache settings for hosting Laravel application
# =============================================================================

# -----------------------------------------------------------------------------
# Virtual Host الرئيسي
# Main Virtual Host
# -----------------------------------------------------------------------------
<VirtualHost *:80>
    # -------------------------------------------------------------------------
    # اسم الخادم
    # Server name
    # -------------------------------------------------------------------------
    ServerName localhost
    ServerAlias *.localhost
    
    # -------------------------------------------------------------------------
    # البريد الإلكتروني للمشرف
    # Administrator email
    # -------------------------------------------------------------------------
    ServerAdmin webmaster@localhost
    
    # -------------------------------------------------------------------------
    # دليل المستندات الجذر
    # Document root directory
    # -------------------------------------------------------------------------
    # هذا هو المجلد الذي سيتم خدمة الملفات منه
    # This is the directory from which files will be served
    DocumentRoot /var/www/html/public
    
    # -------------------------------------------------------------------------
    # إعدادات الدليل
    # Directory settings
    # -------------------------------------------------------------------------
    <Directory /var/www/html/public>
        # السماح بإعادة كتابة الروابط
        # Allow rewrite links
        Options Indexes FollowSymLinks
        
        # السماح بتجاوز الإعدادات عبر .htaccess
        # Allow override settings via .htaccess
        AllowOverride All
        
        # السماح بالوصول للجميع
        # Allow access to all
        Require all granted
        
        # إعادة كتابة الروابط (Clean URLs)
        # URL rewriting for Laravel
        <IfModule mod_rewrite.c>
            # تشغيل محرك إعادة الكتابة
            # Turn on rewrite engine
            RewriteEngine On
            
            # إعادة توجيه الطلبات إلى index.php
            # Redirect requests to index.php
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php/$1 [L]
        </IfModule>
    </Directory>
    
    # -------------------------------------------------------------------------
    # إعدادات PHP
    # PHP settings
    # -------------------------------------------------------------------------
    <IfModule mod_php.c>
        # زيادة حدود الذاكرة
        # Increase memory limit
        php_value memory_limit 512M
        
        # زيادة حدود رفع الملفات
        # Increase file upload limits
        php_value upload_max_filesize 64M
        php_value post_max_size 64M
        
        # زيادة وقت التنفيذ
        # Increase execution time
        php_value max_execution_time 300
        php_value max_input_time 300
    </IfModule>
    
    # -------------------------------------------------------------------------
    # ضغط Gzip
    # Gzip compression
    # -------------------------------------------------------------------------
    <IfModule mod_deflate.c>
        # تشغيل الضغط
        # Enable compression
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE application/xml
        AddOutputFilterByType DEFLATE application/xhtml+xml
        AddOutputFilterByType DEFLATE application/rss+xml
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/x-javascript
        AddOutputFilterByType DEFLATE application/json
        
        # استثناءات من الضغط
        # Compression exceptions
        SetEnvIfNoCase Request_URI \
            \.(?:gif|jpe?g|png)$ no-gzip dont-vary
        SetEnvIfNoCase Request_URI \
            \.(?:exe|t?gz|zip|bz2|sit|rar)$ no-gzip dont-vary
        SetEnvIfNoCase Request_URI \
            \.(?:pdf|mov|avi|mp3|mp4|wmv)$ no-gzip dont-vary
    </IfModule>
    
    # -------------------------------------------------------------------------
    # رؤوس HTTP الأمنية
    # HTTP security headers
    # -------------------------------------------------------------------------
    <IfModule mod_headers.c>
        # منع الضغط في iframe
        # Prevent framing
        Header always set X-Frame-Options "SAMEORIGIN"
        
        # منع نوع MIME الخاطئ
        # Prevent MIME type sniffing
        Header always set X-Content-Type-Options "nosniff"
        
        # تفعيل حماية XSS
        # Enable XSS protection
        Header always set X-XSS-Protection "1; mode=block"
        
        # سياسة الإحالة
        # Referrer policy
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        
        # سياسة الأمان للمحتوى
        # Content security policy
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';"
        
        # إزالة معلومات الخادم
        # Remove server information
        Header always unset X-Powered-By
        Header always unset Server
    </IfModule>
    
    # -------------------------------------------------------------------------
    # التحكم في الوصول
    # Access control
    # -------------------------------------------------------------------------
    # حظر الوصول إلى الملفات الحساسة
    # Block access to sensitive files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    
    <FilesMatch "\.(git|gitignore|gitattributes|lock)$">
        Require all denied
    </FilesMatch>
    
    # حظر الوصول إلى ملفات البيئة
    # Block access to environment files
    <FilesMatch "\.env">
        Require all denied
    </FilesMatch>
    
    # حظر الوصول إلى ملفات التكوين
    # Block access to config files
    <FilesMatch "\.(conf|ini|log|sh)$">
        Require all denied
    </FilesMatch>
    
    # -------------------------------------------------------------------------
    # التخزين المؤقت للمتصفح
    # Browser caching
    # -------------------------------------------------------------------------
    <IfModule mod_expires.c>
        # تشغيل Expires
        # Enable Expires
        ExpiresActive On
        
        # افتراضي: بدون تخزين مؤقت
        # Default: no caching
        ExpiresDefault "access plus 0 seconds"
        
        # الملفات الثابتة: تخزين لمدة سنة
        # Static files: cache for 1 year
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType text/css "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        ExpiresByType application/x-javascript "access plus 1 year"
        
        # الخطوط: تخزين لمدة سنة
        # Fonts: cache for 1 year
        ExpiresByType font/woff "access plus 1 year"
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType application/font-woff "access plus 1 year"
        ExpiresByType application/font-woff2 "access plus 1 year"
        
        # HTML: تخزين لمدة ساعة
        # HTML: cache for 1 hour
        ExpiresByType text/html "access plus 1 hour"
        
        # JSON: تخزين لمدة ساعة
        # JSON: cache for 1 hour
        ExpiresByType application/json "access plus 1 hour"
    </IfModule>
    
    # -------------------------------------------------------------------------
    # ملفات السجلات
    # Log files
    # -------------------------------------------------------------------------
    # مسار سجل الأخطاء
    # Error log path
    ErrorLog ${APACHE_LOG_DIR}/semo_error.log
    
    # مسار سجل الوصول
    # Access log path
    CustomLog ${APACHE_LOG_DIR}/semo_access.log combined
    
    # تنسيق السجل المدمج
    # Combined log format
    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
</VirtualHost>

# -----------------------------------------------------------------------------
# إعدادات SSL (اختياري - للإنتاج)
# SSL settings (optional - for production)
# -----------------------------------------------------------------------------
<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName localhost
        DocumentRoot /var/www/html/public
        
        # SSL Engine
        SSLEngine on
        
        # مسارات الشهادات
        # Certificate paths
        SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
        SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
        
        # إعدادات SSL الآمنة
        # Secure SSL settings
        SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
        SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
        SSLHonorCipherOrder on
        
        <Directory /var/www/html/public>
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>
        
        ErrorLog ${APACHE_LOG_DIR}/semo_ssl_error.log
        CustomLog ${APACHE_LOG_DIR}/semo_ssl_access.log combined
    </VirtualHost>
</IfModule>
