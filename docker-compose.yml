# =============================================================================
# Docker Compose Configuration for SEMO Application - Dokploy Ready
# =============================================================================
# هذا الملف مُحسّن للنشر على Dokploy
# This file is optimized for Dokploy deployment
# =============================================================================

# -----------------------------------------------------------------------------
# إصدار Docker Compose
# Docker Compose version
# -----------------------------------------------------------------------------
version: '3.8'

# -----------------------------------------------------------------------------
# تعريف الخدمات
# Services definition
# -----------------------------------------------------------------------------
services:
  # ===========================================================================
  # خدمة التطبيق الرئيسية (PHP + Apache)
  # Main Application Service (PHP + Apache)
  # ===========================================================================
  app:
    # -------------------------------------------------------------------------
    # إعدادات البناء
    # Build settings
    # -------------------------------------------------------------------------
    build:
      # مسار ملف Dockerfile
      # Dockerfile path
      context: .
      dockerfile: Dockerfile
    
    # -------------------------------------------------------------------------
    # إعادة التشغيل تلقائياً
    # Auto-restart policy
    # -------------------------------------------------------------------------
    restart: unless-stopped
    
    # -------------------------------------------------------------------------
    # المنافذ المتاحة - المنفذ 80 مهم لـ Dokploy
    # Exposed ports - port 80 is required for Dokploy
    # -------------------------------------------------------------------------
    ports:
      # ربط المنفذ 80 (مطلوب لـ Dokploy)
      # Map port 80 (required for Dokploy)
      - "80:80"
    
    # -------------------------------------------------------------------------
    # المجلدات المشتركة (Volumes)
    # Shared volumes - using Docker volumes for Dokploy
    # -------------------------------------------------------------------------
    volumes:
      # حجم دائم للتخزين
      # Persistent volume for storage
      - storage_data:/var/www/html/backend/storage
      # حجم دائم للسجلات
      # Persistent volume for logs
      - logs_data:/var/www/html/backend/storage/logs
    
    # -------------------------------------------------------------------------
    # متغيرات البيئة
    # Environment variables
    # -------------------------------------------------------------------------
    environment:
      # اسم التطبيق
      # Application name
      - APP_NAME=SEMO
      # بيئة التشغيل
      # Application environment
      - APP_ENV=production
      # تشغيل وضع التصحيح (false للإنتاج)
      # Debug mode (false for production)
      - APP_DEBUG=false
      # مفتاح التطبيق (يجب تغييره في الإنتاج)
      # App key (change in production)
      - APP_KEY=${APP_KEY:-base64:defaultkey123}
      # URL التطبيق - Dokploy يستخدم نطاقه الخاص
      # Application URL - Dokploy uses its own domain
      - APP_URL=${APP_URL:-http://localhost}
      
      # إعدادات قاعدة البيانات
      # Database settings
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=semo
      - DB_USERNAME=semo_user
      - DB_PASSWORD=${DB_PASSWORD:-secret123}
      
      # إعدادات Redis
      # Redis settings
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379
      
      # إعدادات البريد
      # Mail settings
      - MAIL_MAILER=log
      - MAIL_HOST=null
      - MAIL_PORT=null
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=no-reply@semo.com
      - MAIL_FROM_NAME=SEMO
    
    # -------------------------------------------------------------------------
    # الاعتماديات على الخدمات الأخرى
    # Dependencies on other services
    # -------------------------------------------------------------------------
    depends_on:
      - db
      - redis
    
    # -------------------------------------------------------------------------
    # الشبكات
    # Networks
    # -------------------------------------------------------------------------
    networks:
      - dokploy-network
    
    # -------------------------------------------------------------------------
    # فحص صحة الحاوية
    # Health check
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # -------------------------------------------------------------------------
    # تسميات Dokploy (Labels)
    # Dokploy labels for Traefik routing
    # -------------------------------------------------------------------------
    labels:
      # تفعيل Traefik
      # Enable Traefik
      - "traefik.enable=true"
      # قاعدة التوجيه - استخدام النطاق من متغير البيئة
      # Routing rule - use domain from environment variable
      - "traefik.http.routers.app.rule=Host(`${APP_DOMAIN:-localhost}`)"
      # المنفذ الداخلي للخدمة
      # Internal service port
      - "traefik.http.services.app.loadbalancer.server.port=80"

  # ===========================================================================
  # خدمة قاعدة البيانات (MySQL)
  # Database Service (MySQL)
  # ===========================================================================
  db:
    # -------------------------------------------------------------------------
    # صورة MySQL
    # MySQL image
    # -------------------------------------------------------------------------
    image: mysql:8.0
    
    # -------------------------------------------------------------------------
    # إعادة التشغيل تلقائياً
    # Auto-restart policy
    # -------------------------------------------------------------------------
    restart: unless-stopped
    
    # -------------------------------------------------------------------------
    # المجلدات المشتركة - حجم دائم للبيانات
    # Shared volumes - persistent data volume
    # -------------------------------------------------------------------------
    volumes:
      # حجم دائم للحفاظ على بيانات قاعدة البيانات
      # Persistent volume for database data
      - mysql_data:/var/lib/mysql
      # ملفات SQL الأولية (تنفذ عند أول تشغيل)
      # Initial SQL files (executed on first run)
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    
    # -------------------------------------------------------------------------
    # متغيرات البيئة
    # Environment variables
    # -------------------------------------------------------------------------
    environment:
      # كلمة مرور المستخدم الجذر
      # Root user password
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret123}
      # اسم قاعدة البيانات
      # Database name
      - MYSQL_DATABASE=semo
      # اسم مستخدم قاعدة البيانات
      # Database username
      - MYSQL_USER=semo_user
      # كلمة مرور مستخدم قاعدة البيانات
      # Database user password
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret123}
    
    # -------------------------------------------------------------------------
    # إعدادات MySQL الإضافية
    # Additional MySQL settings
    # -------------------------------------------------------------------------
    command: --default-authentication-plugin=mysql_native_password
    
    # -------------------------------------------------------------------------
    # الشبكات
    # Networks
    # -------------------------------------------------------------------------
    networks:
      - dokploy-network
    
    # -------------------------------------------------------------------------
    # فحص صحة الحاوية
    # Health check
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # خدمة Redis (للتخزين المؤقت والجلسات)
  # Redis Service (for caching and sessions)
  # ===========================================================================
  redis:
    # -------------------------------------------------------------------------
    # صورة Redis
    # Redis image
    # -------------------------------------------------------------------------
    image: redis:7-alpine
    
    # -------------------------------------------------------------------------
    # إعادة التشغيل تلقائياً
    # Auto-restart policy
    # -------------------------------------------------------------------------
    restart: unless-stopped
    
    # -------------------------------------------------------------------------
    # المجلدات المشتركة - حجم دائم للبيانات
    # Shared volumes - persistent data volume
    # -------------------------------------------------------------------------
    volumes:
      # حجم دائم لبيانات Redis
      # Persistent volume for Redis data
      - redis_data:/data
    
    # -------------------------------------------------------------------------
    # إعدادات Redis
    # Redis settings
    # -------------------------------------------------------------------------
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    
    # -------------------------------------------------------------------------
    # الشبكات
    # Networks
    # -------------------------------------------------------------------------
    networks:
      - dokploy-network
    
    # -------------------------------------------------------------------------
    # فحص صحة الحاوية
    # Health check
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # خدمة Nginx (بروكسي عكسي - اختيارية)
  # Nginx Service (Reverse Proxy - Optional)
  # ===========================================================================
  nginx:
    # -------------------------------------------------------------------------
    # صورة Nginx
    # Nginx image
    # -------------------------------------------------------------------------
    image: nginx:alpine
    
    # -------------------------------------------------------------------------
    # إعادة التشغيل تلقائياً
    # Auto-restart policy
    # -------------------------------------------------------------------------
    restart: unless-stopped
    
    # -------------------------------------------------------------------------
    # المنافذ المتاحة
    # Exposed ports
    # -------------------------------------------------------------------------
    ports:
      # المنفذ 80 للوصول عبر HTTP
      # Port 80 for HTTP access
      - "80:80"
      # المنفذ 443 للوصول عبر HTTPS
      # Port 443 for HTTPS access
      - "443:443"
    
    # -------------------------------------------------------------------------
    # المجلدات المشتركة
    # Shared volumes
    # -------------------------------------------------------------------------
    volumes:
      # إعدادات Nginx المخصصة
      # Custom Nginx configuration
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # شهادات SSL (للإنتاج)
      # SSL certificates (for production)
      - ./docker/ssl:/etc/nginx/ssl:ro
      # ملفات التطبيق الثابتة
      # Static application files
      - ./public:/var/www/html/public:ro
    
    # -------------------------------------------------------------------------
    # الاعتماديات
    # Dependencies
    # -------------------------------------------------------------------------
    depends_on:
      - app
    
    # -------------------------------------------------------------------------
    # الشبكات
    # Networks
    # -------------------------------------------------------------------------
    networks:
      - dokploy-network
    
    # -------------------------------------------------------------------------
    # فحص صحة الحاوية
    # Health check
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# -----------------------------------------------------------------------------
# تعريف الأحجام الدائمة
# Persistent volumes definition
# -----------------------------------------------------------------------------
volumes:
  # ===========================================================================
  # حجم بيانات MySQL
  # MySQL data volume
  # ===========================================================================
  mysql_data:
    driver: local
  
  # ===========================================================================
  # حجم بيانات Redis
  # Redis data volume
  # ===========================================================================
  redis_data:
    driver: local
  
  # ===========================================================================
  # حجم التخزين
  # Storage volume
  # ===========================================================================
  storage_data:
    driver: local
  
  # ===========================================================================
  # حجم السجلات
  # Logs volume
  # ===========================================================================
  logs_data:
    driver: local

# -----------------------------------------------------------------------------
# تعريف الشبكات
# Networks definition
# -----------------------------------------------------------------------------
networks:
  # ===========================================================================
  # الشبكة الافتراضية لـ Dokploy
  # Dokploy default network
  # ===========================================================================
  dokploy-network:
    # Dokploy يتطلب اسم شبكة افتراضي
    # Dokploy requires default network name
    external: true
    name: dokploy-network

# -----------------------------------------------------------------------------
# أوامر Docker Compose المفيدة:
# Useful Docker Compose commands:
# -----------------------------------------------------------------------------
# بناء وتشغيل الخدمات:
# Build and run services:
#   docker-compose up -d --build
#
# إيقاف الخدمات:
# Stop services:
#   docker-compose down
#
# إيقاف الخدمات وحذف الأحجام:
# Stop services and remove volumes:
#   docker-compose down -v
#
# عرض السجلات:
# View logs:
#   docker-compose logs -f app
#
# إعادة بناء خدمة محددة:
# Rebuild specific service:
#   docker-compose up -d --build app
#
# تنفيذ أمر داخل حاوية:
# Execute command inside container:
#   docker-compose exec app php artisan migrate
# -----------------------------------------------------------------------------
